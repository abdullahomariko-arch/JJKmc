name: JJKmc
version: '${project.version}'
main: me.axebanz.jJK.JJKCursedToolsPlugin
api-version: '1.20'
description: Jujutsu Kaisen Minecraft Plugin

commands:
  jjk:
    description: Main JJK command
    usage: /jjk <subcommand>
  projection:
    description: Projection Sorcery technique commands
    usage: /projection <subcommand>
  creation:
    description: Creation technique commands
    usage: /creation <subcommand>
  domain:
    description: Domain Expansion command
    usage: /domain
  seance:
    description: Seance technique command
    usage: /seance
  strawdoll:
    description: Straw Doll technique commands
    usage: /strawdoll <subcommand>
  copy:
    description: Copy technique command
    usage: /copy <subcommand>
  idledeathgamble:
    description: Idle Death Gamble technique commands
    usage: /idledeathgamble <subcommand>
  boogiewoogie:
    description: Boogie Woogie technique commands
    usage: /boogiewoogie <subcommand>
  cursedspeech:
    description: Cursed Speech technique commands
    usage: /cursedspeech <subcommand>
  technique:
    description: Manage your technique
    usage: /technique <subcommand>
  jjkgive:
    description: Give JJK items
    usage: /jjkgive <player> <item> [amount]
  permadeath:
    description: Permadeath management
    usage: /permadeath <subcommand>
  setwaitingroom:
    description: Set waiting room location
    usage: /setwaitingroom
  wheel:
    description: Wheel of Fortune technique commands
    usage: /wheel <subcommand>
  status:
    description: Show player status
    usage: /status
  removebindingvow:
    description: Remove binding vow
    usage: /removebindingvow <player>

permissions:
  jjk.admin:
    description: Full admin access
    default: op
  jjk.use:
    description: Use JJK abilities
    default: true
